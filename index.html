<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Driver Assist</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        crossorigin=""
    />

    <link rel="stylesheet" href="./css/app.css" />

    <link rel="icon"
      type="image/png"
      href="./assets/images/OMLogo-128.png">
</head>
<body>

    <div id="app">

        <div id="mainArea">

            <aside id="sidebar">

                <div id="sidebar-header">

                    <img
                        id="app-logo"
                        src="./assets/images/OMLogo-128.png"
                        alt="openmatrixproject Logo">

                    <h1>openmatrixproject driverAssist</h1>

                </div>

                <details open>
                    <summary>Route</summary>

                    <div class="details-level-1">
                        <button id="btnRoute">
                            Find Route
                        </button>
                    </div>

                </details>

                <details id="evidenceMetricsPanel" open>

                    <summary>
                        Evidence
                    </summary>

                    <div id="evidenceMetricsContent">
                    </div>

                </details>

                <details
                    id="acquisitionRequestsPanel"
                    open
                >

                    <summary
                        id="acquisitionRequestsSummary"
                    >
                        Acquisition Requests
                    </summary>

                    <div
                        id="acquisitionRequestsContent"
                    >
                    </div>

                </details>

                <details id="showPanel" open>

                    <summary>
                        Show
                    </summary>

                    <div id="showContent">
                    </div>

                </details>

            </aside>

            <main id="map"></main>

        </div>

        <div id="splitter"></div>
        
        <div id="bottomPane">

            <div id="applicationLog">
            </div>

        </div>

        <div id="statusBar">

            <div id="statusInferenceEngine">Idle</div>
            <div id="statusCursor">lat: 0, lng: 0</div>
            <div id="statusAddress">Unknown Address</div>
            <div id="statusProfile">Car</div>
            <div id="statusDistance">0 km</div>
            <div id="statusGuidance"></div>

        </div>

    </div>

    <!-- Leaflet JS -->
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        crossorigin=""
    ></script>

    <script type="module" src="./js/main.js">
        initialiseApplication();
    </script>

</body>
</html>
